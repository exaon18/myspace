<!DOCTYPE html>
<html lang="en">
    {% load static %}
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Campfire</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.min.js"></script>
<script>
  if (typeof THREE === 'undefined') {
    document.write('<script src="https://unpkg.com/three@0.150.1/build/three.min.js"><\/script>');
  }
</script>
<style>
  :root{
    --panel-bg: rgba(10,8,18,0.78);
    --panel-border: rgba(255,255,255,0.07);
    --ember: #ff7a3d;
    --ember-soft: #ffb37a;
    --ok-green: #3ddc84;
    --leave-red: #e2473d;
    --text-dim: #8a8499;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{
    margin:0; padding:0; width:100%; height:100%;
    background:#030408;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow:hidden;
    color:#fff;
  }
  #scene{ position:fixed; inset:0; width:100%; height:100%; display:block; }
  #overlay{ position:fixed; inset:0; pointer-events:none; }
  #overlay > *{ pointer-events:auto; }

  /* info panel */
  #info-panel{
    position:absolute; top:14px; left:14px;
    background:var(--panel-bg); border:1px solid var(--panel-border);
    border-radius:16px; padding:10px 14px;
    backdrop-filter: blur(14px);
    min-width:156px;
    box-shadow:0 8px 32px rgba(0,0,0,0.5);
  }
  .info-row{ display:flex; align-items:center; justify-content:space-between; gap:10px; padding:4px 0; }
  .info-label{ font-size:11px; color:var(--text-dim); text-transform:uppercase; letter-spacing:.06em; }
  .info-value{ font-size:14px; font-weight:600; }
  #copy-btn{
    background:rgba(255,255,255,0.07); border:none; color:#fff; border-radius:8px;
    width:24px; height:24px; font-size:12px; cursor:pointer; flex-shrink:0;
    transition: background .15s;
  }
  #copy-btn:hover{ background:rgba(255,255,255,0.14); }
  .dot{ width:7px; height:7px; border-radius:50%; display:inline-block; margin-right:5px; background:#3d3650; }
  .dot.green{ background:var(--ok-green); box-shadow:0 0 8px var(--ok-green); }
  .dot.red{ background:var(--leave-red); }

  /* top-right controls */
  #top-controls{ position:absolute; top:14px; right:14px; display:flex; gap:10px; }
  .round-btn{
    width:42px; height:42px; border-radius:50%; border:1px solid var(--panel-border);
    background:var(--panel-bg); backdrop-filter:blur(14px); cursor:pointer;
    display:flex; align-items:center; justify-content:center; color:#fff;
    box-shadow:0 8px 24px rgba(0,0,0,0.4);
    transition: background .15s, border-color .15s, color .15s;
  }
  .round-btn svg{ width:19px; height:19px; }
  .round-btn.active{ background:rgba(61,220,132,0.16); border-color:rgba(61,220,132,0.38); color:var(--ok-green); }
  .round-btn.off{ background:rgba(226,71,61,0.14); border-color:rgba(226,71,61,0.35); color:var(--leave-red); }
  #leave-btn{ background:rgba(226,71,61,0.18); border-color:rgba(226,71,61,0.4); color:#ff8b82; }

  /* avatar labels */
  .avatar-label{
    position:absolute; transform:translate(-50%,-100%); text-align:center;
    font-size:12px; font-weight:600; white-space:nowrap; pointer-events:none;
    text-shadow:0 2px 8px rgba(0,0,0,0.9), 0 0 24px rgba(0,0,0,0.6);
    display:flex; flex-direction:column; align-items:center; gap:4px;
  }
  .avatar-label .name-row{ display:flex; align-items:center; gap:4px; }
  .you-tag{ background:var(--ok-green); color:#06210f; font-size:9px; font-weight:700;
    padding:1px 5px; border-radius:6px; letter-spacing:.04em; }
  .bars{ display:flex; align-items:flex-end; gap:1.5px; height:9px; opacity:0; transition:opacity .15s; }
  .bars.speaking{ opacity:1; }
  .bars span{ width:2.5px; background:var(--ok-green); border-radius:1px; animation:bar 0.9s infinite ease-in-out; }
  .bars span:nth-child(1){ height:40%; animation-delay:0s; }
  .bars span:nth-child(2){ height:100%; animation-delay:.15s; }
  .bars span:nth-child(3){ height:65%; animation-delay:.3s; }
  @keyframes bar{ 0%,100%{ transform:scaleY(0.4); } 50%{ transform:scaleY(1); } }

  .speech-bubble{
    position:absolute; transform:translate(-50%,-100%); pointer-events:none;
    background:rgba(255,255,255,0.96); color:#15131c; padding:7px 11px; border-radius:14px;
    font-size:12.5px; font-weight:500; max-width:168px; line-height:1.3;
    box-shadow:0 8px 24px rgba(0,0,0,0.45);
    opacity:0; transition:opacity .25s, transform .25s;
    transform:translate(-50%,-100%) translateY(4px);
  }
  .speech-bubble::after{
    content:""; position:absolute; left:50%; bottom:-5px; transform:translateX(-50%);
    border-width:6px 6px 0; border-style:solid; border-color:rgba(255,255,255,0.96) transparent transparent;
  }
  .speech-bubble.show{ opacity:1; transform:translate(-50%,-100%) translateY(0); }

  /* chat panel */
  #chat-panel{
    position:absolute; right:14px; bottom:84px;
    width:min(268px, 44vw); max-height:48vh;
    background:var(--panel-bg); border:1px solid var(--panel-border);
    border-radius:18px; backdrop-filter:blur(14px);
    display:flex; flex-direction:column; overflow:hidden;
    box-shadow:0 12px 36px rgba(0,0,0,0.45);
  }
  #chat-log{ flex:1; overflow-y:auto; padding:10px 12px; display:flex; flex-direction:column; gap:8px; }
  #chat-log::-webkit-scrollbar{ width:3px; }
  #chat-log::-webkit-scrollbar-thumb{ background:rgba(255,255,255,0.12); border-radius:3px; }
  .msg{ font-size:12.5px; line-height:1.38; }
  .msg .who{ font-weight:700; margin-right:5px; }
  .msg .time{ color:var(--text-dim); font-size:10px; margin-left:5px; }
  .msg.system{ color:var(--text-dim); font-style:italic; font-size:11.5px; }

  /* input bar */
  #input-bar{
    position:absolute; left:14px; bottom:14px;
    width:min(360px, calc(100% - 28px));
    display:flex; gap:8px; align-items:center;
    background:var(--panel-bg); border:1px solid var(--panel-border);
    border-radius:26px; padding:6px 6px 6px 16px; backdrop-filter:blur(14px);
    box-shadow:0 10px 32px rgba(0,0,0,0.45);
  }
  #msg-input{
    flex:1; background:transparent; border:none; outline:none; color:#fff;
    font-size:14px; padding:8px 0;
  }
  #msg-input::placeholder{ color:var(--text-dim); }
  #send-btn{
    width:36px; height:36px; border-radius:50%; border:none; cursor:pointer;
    background:linear-gradient(135deg,#ff8a45,#d45a1a); color:#fff; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 4px 14px rgba(255,100,40,0.4);
    transition: transform .12s;
  }
  #send-btn:active{ transform:scale(0.93); }
  #send-btn svg{ width:16px; height:16px; }

  /* boot screen */
  #boot-screen{
    position:fixed; inset:0; background:#030408; z-index:50;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:16px; transition:opacity .6s;
  }
  #boot-screen .flame{ font-size:44px; animation:flicker 1.4s infinite; }
  @keyframes flicker{ 0%,100%{ opacity:1; transform:scale(1); } 50%{ opacity:.65; transform:scale(.9); } }
  #boot-screen .label{ color:var(--text-dim); font-size:13px; letter-spacing:.06em; }

  /* join overlay */
  #join-overlay{
    position:absolute; left:50%; bottom:14%; transform:translateX(-50%);
    display:flex; flex-direction:column; align-items:center; gap:10px;
  }
  #join-btn{
    display:flex; align-items:center; gap:10px;
    background:linear-gradient(135deg, #ff8a45, #c2421a);
    color:#fff; border:none; border-radius:32px;
    padding:15px 28px; font-size:15px; font-weight:700;
    cursor:pointer;
    box-shadow:0 12px 36px rgba(255,110,50,0.45), 0 0 0 1px rgba(255,255,255,0.12) inset;
    animation:joinPulse 2.4s infinite;
    transition: transform .12s;
  }
  #join-btn:active{ transform:scale(0.96); }
  #join-btn:disabled{ opacity:0.7; cursor:default; animation:none; }
  #join-btn .join-flame{ font-size:18px; animation:flicker 1.4s infinite; }
  @keyframes joinPulse{
    0%,100%{ box-shadow:0 12px 36px rgba(255,110,50,0.45), 0 0 0 1px rgba(255,255,255,0.12) inset; }
    50%{ box-shadow:0 12px 48px rgba(255,110,50,0.7), 0 0 0 1px rgba(255,255,255,0.22) inset; }
  }
  #join-hint{ color:var(--text-dim); font-size:11.5px; letter-spacing:.04em; }

  /* visibility */
  body:not(.connected) #chat-panel,
  body:not(.connected) #input-bar,
  body:not(.connected) #mic-btn,
  body:not(.connected) #leave-btn{ display:none; }
  body.connected #join-overlay{ display:none; }
</style>
</head>
<body>

{% csrf_token %}

<div id="boot-screen">
  <div class="flame">🔥</div>
  <div class="label">gathering around the fire…</div>
</div>

<canvas id="scene"></canvas>

<audio id="ambience-audio" loop preload="auto" src="{% static 'audio/5_MINUTES_FIRE_CRACKLING_RELAXING_SOUND_NO_MUSIC_NATURE_SOUND_CAMPING.mp3' %}"></audio>

<div id="overlay">
  <div id="info-panel">
    <div class="info-row">
      <span class="info-label">Camp ID</span>
    </div>
    <div class="info-row">
      <span class="info-value" id="room-id">—</span>
      <button id="copy-btn" title="Copy">⧉</button>
    </div>
    <div class="info-row">
      <span class="info-label">People</span>
      <span class="info-value" id="people-count">0/5</span>
    </div>
    <div class="info-row">
      <span class="info-label"><span class="dot" id="voice-dot"></span>Voice</span>
      <span class="info-value" id="voice-status">—</span>
    </div>
  </div>

  <div id="top-controls">
    <button class="round-btn off" id="ambient-btn" title="Ambient sound">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
    </button>
    <button class="round-btn off" id="mic-btn" title="Microphone">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
    </button>
    <button class="round-btn active" id="speaker-btn" title="Speaker">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
    </button>
    <button class="round-btn" id="leave-btn" title="Leave camp">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </div>

  <div id="join-overlay">
    <button id="join-btn">
      <span class="join-flame">🔥</span>
      <span id="join-label">Join the Campfire</span>
    </button>
    <div id="join-hint">5 people max · voice + text</div>
  </div>

  <div id="chat-panel">
    <div id="chat-log"></div>
  </div>

  <div id="input-bar">
    <input id="msg-input" type="text" placeholder="Say something…" maxlength="200">
    <button id="send-btn">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
/* ================================================================
   TELEGRAM MINI APP BOOTSTRAP
   We fully capture tg.initData (the raw signed query string),
   tg.initDataUnsafe (the parsed object), plus platform and version.
   All of it is forwarded to the Django backend in the POST body so
   your view can run the HMAC validation against your bot token.
   ================================================================ */
const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
let tgUser = null;
let tgInitData = '';       // raw HMAC-signed string — the one you MUST validate server-side
let tgPlatform = 'unknown';
let tgVersion = '';

if (tg) {
  tg.ready();
  tg.expand();
  try { tg.setHeaderColor('#030408'); tg.setBackgroundColor('#030408'); } catch(e) {}

  tgInitData  = tg.initData || '';
  tgPlatform  = tg.platform || 'unknown';
  tgVersion   = tg.version  || '';

  // initDataUnsafe.user is the parsed user object inside the signed string.
  // Do NOT trust it for auth decisions — only use it client-side for display.
  // Trust initData (HMAC-validated on the server) for anything security-relevant.
  tgUser = (tg.initDataUnsafe && tg.initDataUnsafe.user) ? tg.initDataUnsafe.user : null;
}

// CSRF: primary source is the hidden input Django renders via {% csrf_token %}.
// Fallback to the cookie in case the page is served outside normal Django views.
function getCsrfToken(){
  const input = document.querySelector('input[name="csrfmiddlewaretoken"]');
  if (input && input.value) return input.value;
  const match = document.cookie.match('(^|;)\\s*csrftoken\\s*=\\s*([^;]+)');
  return match ? decodeURIComponent(match.pop()) : '';
}

/* ================================================================
   reportToServer — POST to Django backend on load.
   Sends the full initData string so the server can run:
     HMAC-SHA256(secret_key, data_check_string) == hash
   Returns { roomId, members, username, … } if the backend assigns
   this user to a camp; null on any failure (falls back to demo mode).
   ================================================================ */
async function reportToServer() {
  if (!tg || !tgInitData) return null;
  try {
    const payload = {
      initData:  tgInitData,          // ← HMAC-signed, server must validate this
      platform:  tgPlatform,
      version:   tgVersion,
      // client-side convenience copies — server should derive these from initData
      user: tgUser ? {
        id:           tgUser.id,
        first_name:   tgUser.first_name   || '',
        last_name:    tgUser.last_name    || '',
        username:     tgUser.username     || '',
        language_code:tgUser.language_code|| '',
        is_premium:   tgUser.is_premium   || false,
        photo_url:    tgUser.photo_url    || null,
      } : null,
      ts: Date.now(),
    };

    const res = await fetch('', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-CSRFToken':  getCsrfToken(),
        'X-Requested-With': 'XMLHttpRequest',
      },
      credentials: 'same-origin',
      body: JSON.stringify(payload),
    });

    if (res.ok) {
      const data = await res.json().catch(() => null);
      return data;
    }
    console.warn('Backend responded with', res.status);
  } catch(e) {
    console.warn('Backend unreachable, falling back to demo mode:', e);
  }
  return null;
}

const myName = (tgUser && (tgUser.first_name || tgUser.username)) || 'You';

/* ================================================================
   ROOM / MATCHMAKING
   ================================================================ */
const NAME_POOL  = ['Alice','Bob','Emma','Leo','Theo','Otto','Rita','Jo','Elin','Maya'];
const COLOR_POOL = ['#e07a5f','#3d8bdc','#e8b730','#5fb878','#b070d8','#dc6f9b','#56c9c9','#d98a3d'];
let ROOM = { id: null, members: [] };

function randomId(){
  const p = () => Math.random().toString(36).slice(2,6);
  return `camp-${p()}`;
}

function simulateRoom(){
  const pool = NAME_POOL.filter(n => n.toLowerCase() !== myName.toLowerCase());
  const others = [];
  for (let i=0;i<4;i++){
    const idx = Math.floor(Math.random()*pool.length);
    const name = pool.splice(idx,1)[0];
    others.push({ id:'demo-'+i, name, color: COLOR_POOL[i % COLOR_POOL.length], isYou:false });
  }
  ROOM = {
    id: randomId(),
    members: [{ id:'me', name: myName, color:'#7fd6ff', isYou:true }, ...others]
  };
  return ROOM;
}

function simulatePreviewRoom(){
  const pool = [...NAME_POOL];
  const members = [];
  for (let i=0;i<5;i++){
    const idx = Math.floor(Math.random()*pool.length);
    const name = pool.splice(idx,1)[0];
    members.push({ id:'preview-'+i, name, color: COLOR_POOL[i % COLOR_POOL.length], isYou:false });
  }
  return { id: randomId(), members };
}

function applyRoomState(state){
  ROOM = state;
  document.getElementById('room-id').textContent = ROOM.id;
  document.getElementById('people-count').textContent = `${ROOM.members.length}/5`;
}

/* ================================================================
   REAL BACKEND MEMBER TRACKING
   The backend is the single source of truth for who's in the camp.
   On every 'user_joined' broadcast we get:
     { type, message, user, camp_id, users_in_camp, usernames_in_camp }
   - usernames_in_camp: full current roster (list of usernames)
   - users_in_camp: count — drives exactly how many seats render
   We diff usernames_in_camp against what we already know locally to
   add any brand-new members, and keep colors/ids stable across
   updates so avatars don't jump around when someone new joins.
   ================================================================ */
const myUsername = (tgUser && (tgUser.username || tgUser.first_name)) || '';
const knownMembersByUsername = new Map(); // username -> member object

function getOrCreateMember(username){
  if (knownMembersByUsername.has(username)) return knownMembersByUsername.get(username);
  const isYou = !!myUsername && username === myUsername;
  const colorIdx = knownMembersByUsername.size % COLOR_POOL.length;
  const member = {
    id: username,
    name: username,
    color: isYou ? '#7fd6ff' : COLOR_POOL[colorIdx],
    isYou,
  };
  knownMembersByUsername.set(username, member);
  return member;
}

function applyUserJoined(data){
  const camId = data.camp_id;
  const usernames = Array.isArray(data.usernames_in_camp) ? data.usernames_in_camp : [];
  const count = typeof data.users_in_camp === 'number' ? data.users_in_camp : usernames.length;

  // Build/refresh the member list from the authoritative roster,
  // preserving already-known member objects (stable colors/ids).
  const members = usernames.map(getOrCreateMember);

  ROOM = { id: camId || ROOM.id, members };
  document.getElementById('room-id').textContent = ROOM.id || '—';
  document.getElementById('people-count').textContent = `${count}/5`;

  buildCamp(); // re-render seats so avatar count == users_in_camp exactly

  // System message — skip echoing our own join since the UI already
  // shows we're in. Still show others joining.
  const joiningUser = data.user;
  if (joiningUser && joiningUser !== myUsername){
    pushMessage({ system:true, text: data.message || `${joiningUser} has joined the campfire!` });
  } else if (joiningUser && joiningUser === myUsername){
    pushMessage({ system:true, text: `You joined ${ROOM.id || 'the camp'}` });
  }
}

/* ================================================================
   USER LEFT — fired when someone disconnects or leaves the camp:
     { type:'user_left', message, user, camp_id }
   We drop them from the roster, rebuild the seats so their avatar
   disappears immediately, and tear down any audio/speaking state
   tied to them so nothing keeps referencing a member who's gone.
   ================================================================ */
function applyUserLeft(data){
  const leavingUser = data.user;
  if (leavingUser){
    knownMembersByUsername.delete(leavingUser);
    ROOM.members = ROOM.members.filter(m => m.id !== leavingUser);
    document.getElementById('people-count').textContent = `${ROOM.members.length}/5`;
    teardownRemoteAudioPlayer(leavingUser);
  }

  buildCamp(); // re-render seats so the departed member's avatar disappears

  pushMessage({ system:true, text: data.message || `${leavingUser} left the camp` });
}

function handleIncomingChat(data){
  const username = data.user;
  if (!username) return;
  const member = getOrCreateMember(username);
  broadcastMessage(member, data.message || '');
}

/* ================================================================
   WEBSOCKET
   initData is appended as a query string param on the WS URL itself
   (in addition to being sent in the first 'join' message) so the
   Django Channels consumer can read it directly off the scope:
     query_string = self.scope.get('query_string', b'').decode('utf-8')
     query_data   = urllib.parse.parse_qs(query_string)
     init_data    = query_data.get('initData', [''])[0]
   ================================================================ */
let ws = null;
let connected = false;

function wsUrl(){
  const proto = location.protocol === 'https:' ? 'wss://' : 'ws://';
  const params = new URLSearchParams();
  if (tgInitData) params.set('initData', tgInitData);
  if (tgPlatform) params.set('platform', tgPlatform);
  if (tgVersion)  params.set('version', tgVersion);
  const qs = params.toString();
  return `${proto}${location.host}/ws/campfire/${qs ? '?' + qs : ''}`;
}

function connectWebSocket(){
  return new Promise(resolve => {
    let settled = false;
    const finish = ok => { if (!settled){ settled = true; clearTimeout(timer); resolve(ok); } };
    const timer = setTimeout(() => finish(false), 4000);

    let socket;
    try { socket = new WebSocket(wsUrl()); } catch(e){ finish(false); return; }
    ws = socket;
    ws.binaryType = 'arraybuffer'; // mic audio chunks arrive as ArrayBuffer, ready for MediaSource

    socket.addEventListener('open', () => {
      // No payload sent here on purpose — auth travels entirely via the
      // initData query string already attached to the WS URL. The
      // backend identifies this connection from that alone.
    });

    socket.addEventListener('message', evt => {
      // Binary frames are raw mic audio chunks from another camper —
      // never JSON. Route them to the per-speaker playback pipeline
      // and stop here.
      if (evt.data instanceof Blob || evt.data instanceof ArrayBuffer){
        handleIncomingAudioChunk(evt.data);
        return;
      }

      let data;
      try { data = JSON.parse(evt.data); } catch(e){ return; }

      if (data.type === 'user_joined'){
        applyUserJoined(data);
        finish(true);
      } else if (data.type === 'chat'){
        handleIncomingChat(data);
      } else if (data.type === 'user_left' || data.type === 'member_left'){
        applyUserLeft(data);
      } else if (data.type === 'mic_status'){
        handleRemoteMicStatus(data);
      } else if (data.type === 'speaking'){
        setSpeaking(data.memberId, !!data.on);
      } else if (data.type === 'error'){
        pushMessage({ system:true, text: data.message || 'Authentication failed.' });
        finish(false);
      }
    });

    socket.addEventListener('close', () => {
      if (connected){
        connected = false;
        autoRotate = true;
        document.body.classList.remove('connected');
        pushMessage({ system:true, text:'Disconnected from the camp.' });
        document.getElementById('join-label').textContent = 'Rejoin the Campfire';
        document.getElementById('join-btn').disabled = false;
      }
      stopStreamingMic();
      if (localStream) localStream.getTracks().forEach(t=>t.stop());
      micOn = false;
      micBtn.classList.remove('active'); micBtn.classList.add('off');
      remoteAudioPlayers.forEach((_, username) => teardownRemoteAudioPlayer(username));
      finish(false);
    });

    socket.addEventListener('error', () => finish(false));
  });
}

function makeTree(variant){
  const g = new THREE.Group();
  const trunkMat = new THREE.MeshStandardMaterial({color:0x1e1208, roughness:0.98, flatShading:true});
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.07,0.13,0.75,7), trunkMat);
  trunk.position.y = 0.37; trunk.castShadow=true; g.add(trunk);

  // Multi-layer canopy with color variation for depth
  const greens = [0x0d2b1f,0x0f3325,0x112e22,0x0e2820,0x132f24];
  const layers = variant===1 ? 4 : (variant===2 ? 3 : 5);
  for (let i=0;i<layers;i++){
    const pct = i/layers;
    const leafMat = new THREE.MeshStandardMaterial({
      color: greens[i%greens.length], roughness:0.92, flatShading:true
    });
    const baseR = (0.7 - pct*0.22) * (0.85 + Math.random()*0.3);
    const h     = (0.9 + Math.random()*0.25) * (variant===2?1.4:1);
    const cone  = new THREE.Mesh(new THREE.ConeGeometry(baseR, h, 7), leafMat);
    cone.position.y = 0.7 + i*(h*0.42);
    cone.rotation.y = (i*0.6 + Math.random()*0.3);
    cone.castShadow = true;
    g.add(cone);
    // Add overlapping layer for fullness
    if (i>0 && i<layers-1){
      const leaf2 = new THREE.Mesh(new THREE.ConeGeometry(baseR*1.12,h*0.6,6), leafMat);
      leaf2.position.y = cone.position.y - h*0.22;
      leaf2.rotation.y = cone.rotation.y + 0.45;
      leaf2.castShadow = true;
      g.add(leaf2);
    }
  }
  return g;
}

/* ---------- REALISTIC MOUNTAIN RANGES ---------- */
// Strategy: each "mountain" is a cluster of overlapping cones + base
// to create natural jagged ridgelines with snow caps, cliff faces,
// and atmospheric haze scaled by distance.

function makePeak(width, height, roughness, col, snowCol, snowFrac){
  const g = new THREE.Group();
  const mat = new THREE.MeshStandardMaterial({
    color:col, flatShading:true, roughness:0.96
  });
  const snowMat = new THREE.MeshStandardMaterial({
    color:snowCol, flatShading:true, roughness:0.85,
    emissive:snowCol, emissiveIntensity:0.07,
  });

  // Main peak cone
  const peakSides = 5 + Math.floor(Math.random()*3);
  const peak = new THREE.Mesh(new THREE.ConeGeometry(width*0.5, height, peakSides), mat);
  peak.rotation.y = Math.random()*Math.PI;
  peak.position.y = height*0.5;
  peak.castShadow = true;
  g.add(peak);

  // Side ridges for organic silhouette
  for (let j=0;j<3;j++){
    const ridgeW = width*(0.2+Math.random()*0.22);
    const ridgeH = height*(0.45+Math.random()*0.38);
    const ridge = new THREE.Mesh(new THREE.ConeGeometry(ridgeW, ridgeH, 5), mat);
    const ra = (j/3)*Math.PI*2 + Math.random()*0.5;
    ridge.position.set(Math.cos(ra)*width*0.28, ridgeH*0.5, Math.sin(ra)*width*0.28);
    ridge.rotation.y = Math.random()*Math.PI;
    ridge.castShadow = true;
    g.add(ridge);
  }

  // Snow cap
  if (snowFrac > 0){
    const capH  = height * snowFrac;
    const capW  = width  * 0.28 * snowFrac;
    const cap   = new THREE.Mesh(new THREE.ConeGeometry(capW, capH, peakSides), snowMat);
    cap.position.y = height - capH*0.45;
    cap.rotation.y = peak.rotation.y;
    g.add(cap);
    // Snow drip tongues
    for (let j=0;j<4;j++){
      const ta = (j/4)*Math.PI*2;
      const dripH = capH*(0.3+Math.random()*0.4);
      const drip  = new THREE.Mesh(new THREE.ConeGeometry(capW*0.22, dripH, 4), snowMat);
      drip.position.set(
        Math.cos(ta)*capW*0.5,
        height - capH*0.5 - dripH*0.3,
        Math.sin(ta)*capW*0.5
      );
      g.add(drip);
    }
  }
  return g;
}

function buildMountainRange(opts){
  // opts: { radius, count, heightRange:[min,max], widthRange:[min,max],
  //          color, snowColor, snowFrac, jitter, yOffset }
  const g = new THREE.Group();
  for (let i=0;i<opts.count;i++){
    const a = (i/opts.count)*Math.PI*2 + (Math.random()-0.5)*opts.jitter;
    const r = opts.radius * (0.88 + Math.random()*0.22);
    const h = opts.heightRange[0] + Math.random()*(opts.heightRange[1]-opts.heightRange[0]);
    const w = opts.widthRange[0]  + Math.random()*(opts.widthRange[1]-opts.widthRange[0]);

    const peak = makePeak(w, h, 0.9, opts.color, opts.snowColor, opts.snowFrac*(0.5+Math.random()*1.1));
    peak.position.set(Math.cos(a)*r, opts.yOffset||0, Math.sin(a)*r);
    peak.rotation.y = Math.random()*Math.PI*2;
    g.add(peak);
  }
  return g;
}

/* ================================================================
   SEATS + CHIBI AVATARS
   Reworked toward a rounder, big-headed chibi proportion with
   readable hairstyles per person (bob / cap / curls / long hair /
   short hair), softer skin shading, and a gentle forward-leaning
   "warming hands by the fire" seated pose.
   ================================================================ */
const SEAT_DEFS = [
  { angle: 200, dist: 2.0, type:'stump' },
  { angle: 270, dist: 2.05,type:'chair' },
  { angle: 340, dist: 2.0, type:'rocker' },
  { angle:  35, dist: 2.0, type:'lowchair' },
  { angle: 110, dist: 2.0, type:'stump' },
];

function deg(a){ return a*Math.PI/180; }

// Hair colors pool for variety
const HAIR_COLORS = [0x2a1f1a,0x6b4226,0x1a1010,0x8b6914,0x3c2a1a,0x111111,0x8a4a20];
const SKIN_TONES  = [0xe8c49a,0xd4956a,0xc4784a,0xf2d6b5,0xa0652f,0xe0b888];
// Hairstyle assigned per seat index: 0=bob(Alice-like),1=cap(Bob-like),
// 2=curls(Leo-like),3=long(Emma-like),4=short(You-like)
const HAIRSTYLES = ['bob','cap','curls','long','short'];

function makeStump(){
  const g = new THREE.Group();
  const mat = new THREE.MeshStandardMaterial({color:0x4a3020,roughness:0.95,flatShading:true});
  const body = new THREE.Mesh(new THREE.CylinderGeometry(0.34,0.4,0.4,11), mat);
  body.position.y=0.2; body.castShadow=true; body.receiveShadow=true;
  // Tree rings on top
  const ringMat = new THREE.MeshStandardMaterial({color:0x3a2414, roughness:1});
  const rings = new THREE.Mesh(new THREE.RingGeometry(0.08,0.34,11), ringMat);
  rings.position.y=0.401; rings.rotation.x=-Math.PI/2;
  g.add(body,rings);
  return g;
}

function makeChair(color){
  const g = new THREE.Group();
  const frameMat = new THREE.MeshStandardMaterial({color:0x5a3a1e,roughness:0.9,flatShading:true});
  const seatMat  = new THREE.MeshStandardMaterial({color,roughness:0.85,flatShading:true});
  const seat = new THREE.Mesh(new THREE.BoxGeometry(0.66,0.07,0.58), seatMat);
  seat.position.y=0.44; seat.castShadow=true;
  const back = new THREE.Mesh(new THREE.BoxGeometry(0.66,0.58,0.07), seatMat);
  back.position.set(0,0.72,-0.28); back.castShadow=true;
  [[-0.28,-0.26],[0.28,-0.26],[-0.28,0.26],[0.28,0.26]].forEach(p=>{
    const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.028,0.028,0.44,6), frameMat);
    leg.position.set(p[0],0.21,p[1]); g.add(leg);
  });
  // Cross brace
  const brace = new THREE.Mesh(new THREE.CylinderGeometry(0.018,0.018,0.56,5), frameMat);
  brace.position.y=0.22; brace.rotation.z=Math.PI/2; g.add(brace);
  g.add(seat,back);
  return g;
}

function makeLowChair(color){
  const g = makeChair(color);
  g.scale.set(1,0.72,1);
  return g;
}

function makeRocker(){
  const g = new THREE.Group();
  const mat = new THREE.MeshStandardMaterial({color:0xb5402a,roughness:0.9,flatShading:true});
  const woodMat = new THREE.MeshStandardMaterial({color:0x3a2010,roughness:0.98,flatShading:true});
  const seat = new THREE.Mesh(new THREE.BoxGeometry(0.58,0.08,0.52), mat); seat.position.y=0.48;
  const back = new THREE.Mesh(new THREE.BoxGeometry(0.58,0.62,0.08), mat); back.position.set(0,0.78,-0.26);
  const armL = new THREE.Mesh(new THREE.BoxGeometry(0.08,0.08,0.52), mat); armL.position.set(-0.28,0.52,0);
  const armR = armL.clone(); armR.position.x=0.28;
  [-0.22,0.22].forEach(z=>{
    const curve = new THREE.Mesh(new THREE.TorusGeometry(0.36,0.028,7,18,Math.PI*0.85), woodMat);
    curve.rotation.z=Math.PI/2+0.4; curve.position.set(0,0.12,z); g.add(curve);
  });
  g.add(seat,back,armL,armR);
  return g;
}

function buildSeat(type, color){
  if (type==='stump')    return makeStump();
  if (type==='chair')    return makeChair(color);
  if (type==='lowchair') return makeLowChair(color);
  if (type==='rocker')   return makeRocker();
  return makeStump();
}

/* ---- Hairstyle builders, attached relative to head center (0,0,0) ---- */
function addHair_bob(g, hairMat, headR){
  // Smooth rounded bob with a side part and a slight flip at the ends
  const cap = new THREE.Mesh(new THREE.SphereGeometry(headR*1.06,16,13,0,Math.PI*2,0,Math.PI*0.62), hairMat);
  cap.position.y = headR*0.12;
  g.add(cap);
  // side panels framing the face
  [-1,1].forEach(side=>{
    const panel = new THREE.Mesh(new THREE.SphereGeometry(headR*0.42,10,10), hairMat);
    panel.position.set(side*headR*0.92, -headR*0.18, headR*0.18);
    panel.scale.set(0.55,1.15,0.7);
    g.add(panel);
  });
  // soft fringe
  const fringe = new THREE.Mesh(new THREE.SphereGeometry(headR*0.98,14,8,0,Math.PI*2,0,Math.PI*0.3), hairMat);
  fringe.position.set(0, headR*0.32, headR*0.05);
  g.add(fringe);
}
function addHair_cap(g, hairMat, headR, capColor){
  // Short hair peeking out + a baseball cap on top
  const short = new THREE.Mesh(new THREE.SphereGeometry(headR*1.02,14,11,0,Math.PI*2,0,Math.PI*0.5), hairMat);
  short.position.y = headR*0.18;
  g.add(short);
  const capMat = new THREE.MeshStandardMaterial({color:capColor, flatShading:true, roughness:0.85});
  const dome = new THREE.Mesh(new THREE.SphereGeometry(headR*1.12,14,10,0,Math.PI*2,0,Math.PI*0.46), capMat);
  dome.position.y = headR*0.32;
  g.add(dome);
  const brim = new THREE.Mesh(new THREE.CylinderGeometry(headR*0.62,headR*0.62,headR*0.06,16,1,false,0,Math.PI), capMat);
  brim.position.set(0, headR*0.22, headR*0.62);
  brim.rotation.x = -0.06;
  g.add(brim);
}
function addHair_curls(g, hairMat, headR){
  // Cluster of small spheres for curly afro-like texture
  const curlCount = 13;
  for (let i=0;i<curlCount;i++){
    const phi = Math.acos(1 - 2*(i+0.5)/curlCount) * 0.62;
    const theta = i * 2.4;
    const r = headR*1.04;
    const cx = r*Math.sin(phi)*Math.cos(theta);
    const cy = r*Math.cos(phi)*0.85 + headR*0.18;
    const cz = r*Math.sin(phi)*Math.sin(theta);
    const curl = new THREE.Mesh(new THREE.SphereGeometry(headR*0.32,8,8), hairMat);
    curl.position.set(cx,cy,cz);
    g.add(curl);
  }
  const base = new THREE.Mesh(new THREE.SphereGeometry(headR*0.95,14,11,0,Math.PI*2,0,Math.PI*0.5), hairMat);
  base.position.y = headR*0.1;
  g.add(base);
}
function addHair_long(g, hairMat, headR){
  // Crown + long hair draping past the shoulders on both sides and back
  const crown = new THREE.Mesh(new THREE.SphereGeometry(headR*1.04,16,12,0,Math.PI*2,0,Math.PI*0.55), hairMat);
  crown.position.y = headR*0.15;
  g.add(crown);
  [-1,1].forEach(side=>{
    const strand = new THREE.Mesh(new THREE.CapsuleGeometry(headR*0.3,headR*1.5,4,8), hairMat);
    strand.position.set(side*headR*0.78, -headR*1.05, headR*0.06);
    strand.rotation.z = side*0.07;
    g.add(strand);
  });
  const back = new THREE.Mesh(new THREE.CapsuleGeometry(headR*0.62,headR*1.1,4,8), hairMat);
  back.position.set(0,-headR*0.75,-headR*0.32);
  g.add(back);
  const fringe = new THREE.Mesh(new THREE.SphereGeometry(headR*0.96,14,8,0,Math.PI*2,0,Math.PI*0.28), hairMat);
  fringe.position.set(0, headR*0.34, headR*0.06);
  g.add(fringe);
}
function addHair_short(g, hairMat, headR){
  // Simple neat short hair, slightly textured on top
  const cap = new THREE.Mesh(new THREE.SphereGeometry(headR*1.03,14,11,0,Math.PI*2,0,Math.PI*0.52), hairMat);
  cap.position.y = headR*0.16;
  g.add(cap);
  for (let i=0;i<5;i++){
    const a = (i/5)*Math.PI*2;
    const tuft = new THREE.Mesh(new THREE.ConeGeometry(headR*0.18,headR*0.3,5), hairMat);
    tuft.position.set(Math.cos(a)*headR*0.55, headR*0.62, Math.sin(a)*headR*0.55);
    tuft.rotation.x = Math.random()*0.4-0.2;
    tuft.rotation.z = Math.random()*0.4-0.2;
    g.add(tuft);
  }
}

function addHairstyle(headGroup, style, hairMat, headR, accentColor){
  if (style==='bob')        addHair_bob(headGroup, hairMat, headR);
  else if (style==='cap')   addHair_cap(headGroup, hairMat, headR, accentColor);
  else if (style==='curls') addHair_curls(headGroup, hairMat, headR);
  else if (style==='long')  addHair_long(headGroup, hairMat, headR);
  else                      addHair_short(headGroup, hairMat, headR);
}

function makeAvatar(member, seatType, idx){
  const g = new THREE.Group();
  const accent   = new THREE.Color(member.color);
  const skinCol  = SKIN_TONES[idx % SKIN_TONES.length];
  const hairCol  = HAIR_COLORS[idx % HAIR_COLORS.length];
  const style    = HAIRSTYLES[idx % HAIRSTYLES.length];
  const skinMat  = new THREE.MeshStandardMaterial({color:skinCol, flatShading:false, roughness:0.7});
  const clothMat = new THREE.MeshStandardMaterial({color:accent,  flatShading:false, roughness:0.78});
  const darkClothMat = new THREE.MeshStandardMaterial({
    color:accent.clone().lerp(new THREE.Color(0x000000),0.45), flatShading:false, roughness:0.85
  });
  const hairMat  = new THREE.MeshStandardMaterial({color:hairCol, flatShading:false, roughness:0.82});
  const shoeMat  = new THREE.MeshStandardMaterial({color:0x1a1a22, flatShading:false, roughness:0.85});

  const sitY = seatType==='lowchair' ? 0.30 : (seatType==='stump' ? 0.41 : 0.49);
  const HEAD_R = 0.225; // bigger chibi head for that rounder, cuter proportion

  // ---- Torso: shorter + rounder so the head dominates the silhouette ----
  const torso = new THREE.Mesh(new THREE.CapsuleGeometry(0.205,0.22,6,10), clothMat);
  torso.position.set(0, sitY + 0.245, 0.02);
  torso.rotation.x = 0.12; // gentle forward lean toward the fire
  torso.castShadow = true;
  g.add(torso);

  // Soft rounded collar/hood detail
  const collar = new THREE.Mesh(new THREE.TorusGeometry(0.13,0.045,8,12), clothMat);
  collar.position.set(0, sitY+0.41, 0.06);
  collar.rotation.x = Math.PI/2 + 0.12;
  g.add(collar);

  // ---- Head group (everything head-related parented here) ----
  const headGroup = new THREE.Group();
  headGroup.position.set(0, sitY + 0.62, 0.03);
  headGroup.rotation.x = 0.1; // slight downward tilt, looking at the fire
  g.add(headGroup);

  const head = new THREE.Mesh(new THREE.SphereGeometry(HEAD_R,20,18), skinMat);
  head.castShadow = true;
  headGroup.add(head);

  // Rounded chibi cheeks (subtle)
  [-1,1].forEach(side=>{
    const cheek = new THREE.Mesh(new THREE.SphereGeometry(HEAD_R*0.22,8,8), skinMat);
    cheek.position.set(side*HEAD_R*0.62, -HEAD_R*0.18, HEAD_R*0.72);
    headGroup.add(cheek);
  });

  // Small simple nose
  const nose = new THREE.Mesh(new THREE.SphereGeometry(HEAD_R*0.1,6,6), skinMat);
  nose.position.set(0, -HEAD_R*0.04, HEAD_R*0.98);
  headGroup.add(nose);

  // Big friendly eyes (chibi-style)
  const eyeMat  = new THREE.MeshStandardMaterial({color:0x18141c, roughness:0.4});
  const eyeWMat = new THREE.MeshStandardMaterial({color:0xfdf8f0, roughness:0.5});
  const glintMat= new THREE.MeshStandardMaterial({color:0xffffff, emissive:0xffffff, emissiveIntensity:0.6});
  [-1,1].forEach(side=>{
    const eyeW = new THREE.Mesh(new THREE.SphereGeometry(HEAD_R*0.16,10,10), eyeWMat);
    eyeW.position.set(side*HEAD_R*0.36, HEAD_R*0.02, HEAD_R*0.88);
    headGroup.add(eyeW);
    const eye = new THREE.Mesh(new THREE.SphereGeometry(HEAD_R*0.095,10,10), eyeMat);
    eye.position.set(side*HEAD_R*0.36, HEAD_R*0.0, HEAD_R*0.96);
    headGroup.add(eye);
    const glint = new THREE.Mesh(new THREE.SphereGeometry(HEAD_R*0.03,6,6), glintMat);
    glint.position.set(side*HEAD_R*0.36+HEAD_R*0.04, HEAD_R*0.05, HEAD_R*1.0);
    headGroup.add(glint);
  });

  // Small rosy blush marks (warm firelight look)
  const blushMat = new THREE.MeshStandardMaterial({color:0xe8836a, transparent:true, opacity:0.35});
  [-1,1].forEach(side=>{
    const blush = new THREE.Mesh(new THREE.SphereGeometry(HEAD_R*0.14,8,8), blushMat);
    blush.position.set(side*HEAD_R*0.58, -HEAD_R*0.22, HEAD_R*0.78);
    blush.scale.set(1,0.6,0.4);
    headGroup.add(blush);
  });

  // Hair, styled per-person
  addHairstyle(headGroup, style, hairMat, HEAD_R, accent);

  // ---- Arms, relaxed toward the fire / resting on knees ----
  [-1,1].forEach(side=>{
    const upper = new THREE.Mesh(new THREE.CapsuleGeometry(0.062,0.2,4,8), clothMat);
    upper.position.set(0.225*side, sitY+0.28, 0.07);
    upper.rotation.z = side*0.48;
    upper.rotation.x = 0.22;
    upper.castShadow = true;
    g.add(upper);
    const lower = new THREE.Mesh(new THREE.CapsuleGeometry(0.052,0.17,4,7), clothMat);
    lower.position.set(0.245*side, sitY+0.13, 0.29);
    lower.rotation.x = 0.78;
    g.add(lower);
    const hand = new THREE.Mesh(new THREE.SphereGeometry(0.065,10,10), skinMat);
    hand.position.set(0.235*side, sitY+0.07, 0.36);
    g.add(hand);
  });

  // ---- Legs bent forward (sitting) ----
  [-1,1].forEach(side=>{
    const thigh = new THREE.Mesh(new THREE.CapsuleGeometry(0.082,0.28,4,8), darkClothMat);
    thigh.rotation.x = Math.PI*0.48;
    thigh.position.set(0.115*side, sitY-0.06, 0.16);
    thigh.castShadow = true;
    g.add(thigh);
    const shin = new THREE.Mesh(new THREE.CapsuleGeometry(0.07,0.27,4,7), darkClothMat);
    shin.position.set(0.115*side, sitY-0.23, 0.37);
    shin.rotation.x = 0.22;
    shin.castShadow = true;
    g.add(shin);
    const shoe = new THREE.Mesh(new THREE.BoxGeometry(0.135,0.075,0.21), shoeMat);
    shoe.position.set(0.115*side, sitY-0.35, 0.47);
    shoe.castShadow = true;
    g.add(shoe);
  });

  // Optional prop — cup of coffee/marshmallow for some
  if (idx % 3 === 0){
    const cupMat = new THREE.MeshStandardMaterial({color:0xcc4422,roughness:0.8});
    const cup = new THREE.Mesh(new THREE.CylinderGeometry(0.04,0.035,0.08,8), cupMat);
    cup.position.set(0.24, sitY+0.07, 0.36);
    g.add(cup);
  }

  g.userData.headY   = sitY + 0.62;
  g.userData.member  = member;
  return g;
}

const seatGroup = new THREE.Group();
const avatarMeta = [];
let roomGeneration = 0;

function buildCamp(){
  roomGeneration++;
  const myGen = roomGeneration;
  seatGroup.clear();
  avatarMeta.length = 0;
  labelEls.forEach(el => el.remove()); labelEls.clear();
  bubbleEls.forEach(el => el.remove()); bubbleEls.clear();

  const members = ROOM.members.slice(0,5);
  members.forEach((member, i) => {
    const def = SEAT_DEFS[i % SEAT_DEFS.length];
    const x = Math.cos(deg(def.angle)) * def.dist;
    const z = Math.sin(deg(def.angle)) * def.dist;

    const seatColor = new THREE.Color(member.color).lerp(new THREE.Color(0x181818),0.52);
    const seat = buildSeat(def.type, seatColor);
    seat.position.set(x,0,z);
    seat.rotation.y = -deg(def.angle) + Math.PI;
    seatGroup.add(seat);

    const avatar = makeAvatar(member, def.type, i);
    avatar.position.set(x,0,z);
    avatar.rotation.y = -deg(def.angle) + Math.PI;
    seatGroup.add(avatar);

    avatarMeta.push({ member, avatar });
  });
  scene.add(seatGroup);
  return myGen;
}

/* ================================================================
   3D → 2D LABEL PROJECTION
   ================================================================ */
const labelLayer = document.getElementById('overlay');
const labelEls   = new Map();
const bubbleEls  = new Map();

function ensureLabel(id, member){
  if (labelEls.has(id)) return labelEls.get(id);
  const el = document.createElement('div');
  el.className = 'avatar-label';
  el.style.color = member.color;
  el.innerHTML = `
    <div class="name-row">
      <span>${member.name}</span>
      ${member.isYou ? '<span class="you-tag">YOU</span>' : ''}
    </div>
    <div class="bars" id="bars-${id}"><span></span><span></span><span></span></div>
  `;
  labelLayer.appendChild(el);
  labelEls.set(id, el);
  return el;
}

function ensureBubble(id){
  if (bubbleEls.has(id)) return bubbleEls.get(id);
  const el = document.createElement('div');
  el.className = 'speech-bubble';
  labelLayer.appendChild(el);
  bubbleEls.set(id, el);
  return el;
}

function showBubble(id, text){
  const el = ensureBubble(id);
  el.textContent = text;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(()=> el.classList.remove('show'), 3500);
}

function setSpeaking(id, on){
  const bars = document.getElementById(`bars-${id}`);
  if (bars) bars.classList.toggle('speaking', on);
}

const tmpVec = new THREE.Vector3();
function updateLabels(){
  avatarMeta.forEach(({member, avatar}) => {
    const el  = ensureLabel(member.id, member);
    tmpVec.set(0, avatar.userData.headY + 0.3, 0).add(avatar.position);
    tmpVec.project(camera);
    const x = (tmpVec.x*0.5+0.5) * window.innerWidth;
    const y = (1-(tmpVec.y*0.5+0.5)) * window.innerHeight;
    el.style.left    = x + 'px';
    el.style.top     = y + 'px';
    el.style.display = tmpVec.z > 1 ? 'none' : 'flex';
    const bEl = bubbleEls.get(member.id);
    if (bEl){ bEl.style.left=x+'px'; bEl.style.top=(y-28)+'px'; }
  });
}

  row.className = 'msg' + (system ? ' system' : '');
  if (system){ row.textContent = text; }
  else { row.innerHTML = `<span class="who" style="color:${color}">${who}</span>${text}<span class="time">${timeNow()}</span>`; }
  chatLog.appendChild(row);
  chatLog.scrollTop = chatLog.scrollHeight;
}
function broadcastMessage(member, text){
  pushMessage({who:member.name, color:member.color, text});
  showBubble(member.id, text);
}

document.getElementById('send-btn').addEventListener('click', sendMyMessage);
document.getElementById('msg-input').addEventListener('keydown', e => {
  if (e.key==='Enter') sendMyMessage();
});
function sendMyMessage(){
  const input = document.getElementById('msg-input');
  const text  = input.value.trim();
  if (!text) return;
  input.value = '';

  if (ws && ws.readyState === WebSocket.OPEN){
    // Real backend: server broadcasts the chat back to the whole camp
    // (including us), so we don't render locally here — wait for the
    // echo via handleIncomingChat to avoid showing it twice.
    sendChatOverSocket(text);
  } else {
    // Demo / no backend: nothing will echo back, so render immediately.
    const me = ROOM.members.find(m => m.isYou);
    if (me) broadcastMessage(me, text);
  }
}

/* Demo chatter */
function startDemoChatter(gen){
  const lines = [
    'hey all 👋','where is everyone from?','this fire is so cozy 🔥',
    'anyone else hear that owl 🦉','love this spot','what time is it for you?',
    'passing the marshmallows 🍡','good vibes tonight','this mountain view though ✨',
    'ok who brought the guitar?','stars are incredible tonight'
  ];
  let i = 0;
  const others = ROOM.members.filter(m => !m.isYou);
  function tick(){
    if (gen !== roomGeneration) return;
    if (i >= lines.length) { i=0; setTimeout(tick, 5000+Math.random()*3000); return; }
    const member = others[i % others.length];
    if (member) broadcastMessage(member, lines[i%lines.length]);
    i++;
    setTimeout(tick, 2000+Math.random()*2600);
  }
  setTimeout(tick, 1400);
}

/* ================================================================
   VOICE — REAL MIC CAPTURE + STREAMING
   On mic press: tell the backend {type:'mic_status', status:true,
   user:myUsername}, then start a MediaRecorder that emits raw binary
   chunks every 100ms straight over the WebSocket.
   On mic release: send the same message with status:false and stop
   recording.
   ================================================================ */
let micOn = false, localStream = null, mediaRecorder = null;
const micBtn     = document.getElementById('mic-btn');
const speakerBtn = document.getElementById('speaker-btn');

// Pick a mimeType the browser's MediaRecorder actually supports.
function pickRecorderMime(){
  const candidates = [
    'audio/webm;codecs=opus',
    'audio/webm',
    'audio/ogg;codecs=opus',
    'audio/mp4',
  ];
  for (const c of candidates){
    if (window.MediaRecorder && MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(c)) return c;
  }
  return ''; // let the browser choose its default
}

function sendMicStatus(status){
  if (ws && ws.readyState === WebSocket.OPEN){
    ws.send(JSON.stringify({ type:'mic_status', status, user:myUsername }));
  }
}

micBtn.addEventListener('click', async () => {
  if (!micOn){
    try {
      localStream = await navigator.mediaDevices.getUserMedia({audio:true});
      micOn = true;
      micBtn.classList.add('active'); micBtn.classList.remove('off');
      const me = ROOM.members.find(m => m.isYou);
      if (me) setSpeaking(me.id, true);

      sendMicStatus(true); // tell backend we're now speaking, before streaming bytes
      startStreamingMic();
      monitorMic();
    } catch(e){ pushMessage({system:true,text:'Microphone permission denied.'}); }
  } else {
    stopStreamingMic();
    sendMicStatus(false); // tell backend we've stopped speaking
    if (localStream) localStream.getTracks().forEach(t=>t.stop());
    micOn = false;
    micBtn.classList.remove('active'); micBtn.classList.add('off');
    const me = ROOM.members.find(m => m.isYou);
    if (me) setSpeaking(me.id, false);
  }
});

function startStreamingMic(){
  if (!localStream || !window.MediaRecorder) return;
  const mimeType = pickRecorderMime();
  try {
    mediaRecorder = mimeType
      ? new MediaRecorder(localStream, { mimeType })
      : new MediaRecorder(localStream);
  } catch(e){
    console.warn('MediaRecorder failed to start:', e);
    return;
  }

  mediaRecorder.addEventListener('dataavailable', evt => {
    if (!evt.data || evt.data.size === 0) return;
    if (!(ws && ws.readyState === WebSocket.OPEN)) return;
    // Send the raw binary chunk as-is — the backend forwards it to
    // everyone else in the camp, who decode/play it on arrival.
    evt.data.arrayBuffer().then(buf => {
      if (ws && ws.readyState === WebSocket.OPEN) ws.send(buf);
    }).catch(()=>{});
  });

  mediaRecorder.start(100); // emit a chunk every 100ms
}

function stopStreamingMic(){
  if (mediaRecorder && mediaRecorder.state !== 'inactive'){
    try { mediaRecorder.stop(); } catch(e){}
  }
  mediaRecorder = null;
}

let speakerOn = true;
speakerBtn.addEventListener('click', () => {
  speakerOn = !speakerOn;
  speakerBtn.classList.toggle('active', speakerOn);
  speakerBtn.classList.toggle('off', !speakerOn);
  applySpeakerMuteState();
});

function monitorMic(){
  if (!localStream) return;
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const src = ctx.createMediaStreamSource(localStream);
  const analyser = ctx.createAnalyser();
  analyser.fftSize = 512;
  src.connect(analyser);
  const data = new Uint8Array(analyser.frequencyBinCount);
  const me   = ROOM.members.find(m => m.isYou);
  function loop(){
    if (!micOn) return;
    analyser.getByteFrequencyData(data);
    const avg = data.reduce((a,b)=>a+b,0)/data.length;
    if (me) setSpeaking(me.id, avg > 12);
    requestAnimationFrame(loop);
  }
  loop();
}

/* ================================================================
   VOICE — RECEIVING REMOTE AUDIO
   Each remote speaker gets one persistent MediaSource-backed <audio>
   element. Incoming binary chunks are appended to that speaker's
   SourceBuffer, which is the correct way to play a continuous stream
   of MediaRecorder chunks (chunks after the first are NOT
   independently decodable files on their own).

   SENDER IDENTIFICATION: the raw mic bytes a browser records carry
   no metadata, so the *backend* tags every relayed binary frame with
   a tiny self-describing header before forwarding it:

       [ 1 byte: username length N ][ N bytes: UTF-8 username ][ ...audio bytes ]

   The frontend strips that header off every incoming binary frame to
   find out who it belongs to, then feeds the remaining bytes to that
   user's player. This makes playback correct regardless of whether
   mic_status arrives before/after/concurrently with the audio — it
   doesn't depend on a side-channel "who's currently speaking" guess.
   mic_status is still used (below) purely to drive the UI "speaking"
   bars and to warm up a player before the first chunk lands.

   See the matching backend snippet at the bottom of this file's
   accompanying notes for the one-line consumer change this requires.
   ================================================================ */
const remoteAudioPlayers = new Map(); // username -> { audioEl, mediaSource, sourceBuffer, queue }
const RECORDER_MIME_GUESS = 'audio/webm;codecs=opus';

function ensureRemoteAudioPlayer(username){
  if (remoteAudioPlayers.has(username)) return remoteAudioPlayers.get(username);

  const audioEl = new Audio();
  audioEl.autoplay = true;
  audioEl.muted = !speakerOn;

  const entry = { audioEl, mediaSource:null, sourceBuffer:null, queue:[], ready:false };

  if (window.MediaSource && MediaSource.isTypeSupported && MediaSource.isTypeSupported(RECORDER_MIME_GUESS)){
    const ms = new MediaSource();
    entry.mediaSource = ms;
    audioEl.src = URL.createObjectURL(ms);
    ms.addEventListener('sourceopen', () => {
      try {
        const sb = ms.addSourceBuffer(RECORDER_MIME_GUESS);
        entry.sourceBuffer = sb;
        entry.ready = true;
        sb.addEventListener('updateend', () => flushRemoteAudioQueue(username));
        flushRemoteAudioQueue(username);
      } catch(e){ console.warn('Could not open SourceBuffer for', username, e); }
    });
  } else {
    console.warn('MediaSource + opus/webm not supported in this browser — remote voice playback unavailable.');
  }

  remoteAudioPlayers.set(username, entry);
  return entry;
}

function flushRemoteAudioQueue(username){
  const entry = remoteAudioPlayers.get(username);
  if (!entry || !entry.sourceBuffer) return;
  if (entry.sourceBuffer.updating) return;
  const next = entry.queue.shift();
  if (next) {
    try { entry.sourceBuffer.appendBuffer(next); } catch(e){ /* drop chunk on error */ }
  }
}

function feedRemoteAudio(username, arrayBuffer){
  const entry = ensureRemoteAudioPlayer(username);
  if (!entry.sourceBuffer){
    entry.queue.push(arrayBuffer);
    return;
  }
  entry.queue.push(arrayBuffer);
  flushRemoteAudioQueue(username);
}

function teardownRemoteAudioPlayer(username){
  const entry = remoteAudioPlayers.get(username);
  if (!entry) return;
  try { entry.audioEl.pause(); } catch(e){}
  try { if (entry.mediaSource && entry.mediaSource.readyState === 'open') entry.mediaSource.endOfStream(); } catch(e){}
  remoteAudioPlayers.delete(username);
}

function applySpeakerMuteState(){
  remoteAudioPlayers.forEach(entry => { entry.audioEl.muted = !speakerOn; });
}

// Called whenever a binary WS frame arrives. Strips the
// [length][username][audio bytes] header the backend attaches and
// routes the remaining audio bytes to that specific user's player.
function handleIncomingAudioChunk(rawData){
  const buf = rawData instanceof ArrayBuffer ? rawData : null;
  if (!buf || buf.byteLength < 2) return; // too short to contain a header

  const view = new DataView(buf);
  const nameLen = view.getUint8(0);
  if (buf.byteLength < 1 + nameLen) return; // malformed/truncated frame — drop it

  const nameBytes = new Uint8Array(buf, 1, nameLen);
  const username = new TextDecoder('utf-8').decode(nameBytes);
  const audioBytes = buf.slice(1 + nameLen);

  if (!username || username === myUsername) return; // backend already excludes the sender, but be defensive
  feedRemoteAudio(username, audioBytes);
}

// Called on every {type:'mic_status', status, user} from the server.
// Purely drives the "speaking" bars UI and warms up a player ahead of
// the first audio chunk — playback itself no longer depends on this.
function handleRemoteMicStatus(data){
  const username = data.user;
  if (!username || username === myUsername) return; // ignore our own echoed status, if any
  setSpeaking(username, !!data.mic_status);
  if (data.mic_status){
    ensureRemoteAudioPlayer(username);
  }
}

function simulateAmbientVoice(gen){
  ROOM.members.filter(m=>!m.isYou).forEach(m=>{
    function pulse(){
      if (gen!==roomGeneration) return;
      setSpeaking(m.id, true);
      setTimeout(()=>{ if(gen===roomGeneration) setSpeaking(m.id,false); }, 900+Math.random()*1600);
      setTimeout(pulse, 4500+Math.random()*7000);
    }
    setTimeout(pulse, 2000+Math.random()*4000);
  });
}

/* ================================================================
   AMBIENT SOUND
   ================================================================ */
const ambienceAudio = document.getElementById('ambience-audio');
ambienceAudio.volume = 0.5;
let ambienceStarted = false;

function initAmbience(){
  if (ambienceStarted) return;
  ambienceStarted = true;
  ambienceAudio.play().catch(e=>console.warn('Ambience blocked:',e));
}

const ambientBtn = document.getElementById('ambient-btn');
ambientBtn.addEventListener('click', () => {
  if (!ambienceStarted){
    initAmbience();
    ambientBtn.classList.add('active'); ambientBtn.classList.remove('off');
    return;
  }
  if (ambienceAudio.paused){
    ambienceAudio.play().catch(()=>{});
    ambientBtn.classList.add('active'); ambientBtn.classList.remove('off');
  } else {
    ambienceAudio.pause();
    ambientBtn.classList.remove('active'); ambientBtn.classList.add('off');
  }
});

/* ================================================================
   LEAVE / COPY
   ================================================================ */
document.getElementById('leave-btn').addEventListener('click', () => {
  stopStreamingMic();
  if (localStream) localStream.getTracks().forEach(t=>t.stop());
  remoteAudioPlayers.forEach((_, username) => teardownRemoteAudioPlayer(username));
  if (ws) ws.close();
  if (tg && tg.close) tg.close();
  else pushMessage({system:true,text:'Left the camp.'});
});
document.getElementById('copy-btn').addEventListener('click', () => {
  navigator.clipboard?.writeText(ROOM.id||'').then(()=>pushMessage({system:true,text:'Camp ID copied.'}));
});

/* ================================================================
   JOIN FLOW
   ================================================================ */
const joinBtn   = document.getElementById('join-btn');
const joinLabel = document.getElementById('join-label');

async function handleJoin(){
  joinBtn.disabled = true;
  joinLabel.textContent = 'Connecting…';
  initAmbience();
  chatLog.innerHTML = '';

  const ok = await connectWebSocket();
  let gen;
  if (!ok){
    applyRoomState(simulateRoom());
    gen = buildCamp();
    pushMessage({system:true, text:`You joined ${ROOM.id} (demo mode — no backend)`});
    ROOM.members.filter(m=>!m.isYou).forEach((m,i)=>{
      setTimeout(()=>pushMessage({system:true,text:`${m.name} joined the camp`}), 350*(i+1));
    });
    startDemoChatter(gen);
    simulateAmbientVoice(gen);
  } else {
    // Real backend: the 'user_joined' broadcast already triggered
    // applyUserJoined(), which rebuilt the camp and pushed the
    // appropriate join message. Nothing further needed here.
    gen = roomGeneration;
  }

  connected = true;
  autoRotate = false;
  document.body.classList.add('connected');
  document.getElementById('voice-status').textContent = 'Connected';
  document.getElementById('voice-dot').classList.add('green');
  joinBtn.disabled = false;
}
joinBtn.addEventListener('click', handleJoin);

/* ================================================================
   BOOT
   ================================================================ */
async function boot(){
  if (typeof THREE === 'undefined'){
    document.querySelector('#boot-screen .label').textContent = '3D library failed to load.';
    document.querySelector('#boot-screen .flame').textContent = '⚠️';
    return;
  }
  const info = await reportToServer();
  const username = info && (info.username || (info.user && info.user.username));
  if (username) joinLabel.textContent = `Join as @${username}`;

  ROOM = simulatePreviewRoom();
  const gen = buildCamp();
  startDemoChatter(gen);
  simulateAmbientVoice(gen);

  document.getElementById('boot-screen').style.opacity = '0';
  setTimeout(()=>{ document.getElementById('boot-screen').style.display='none'; }, 600);
}

/* ================================================================
   CAMERA
   ================================================================ */
let orbitAngle = 0;
let autoRotate = true;
let isDragging = false, dragStartX = 0, dragStartAngle = 0;

canvas.style.cursor = 'grab';
canvas.addEventListener('pointerdown', e=>{
  isDragging=true; dragStartX=e.clientX; dragStartAngle=orbitAngle;
  canvas.style.cursor='grabbing'; canvas.setPointerCapture(e.pointerId);
});
window.addEventListener('pointermove', e=>{
  if (!isDragging) return;
  orbitAngle = dragStartAngle + (e.clientX-dragStartX)*0.006;
});
window.addEventListener('pointerup', ()=>{ isDragging=false; canvas.style.cursor='grab'; });

/* ================================================================
   RENDER LOOP
   ================================================================ */
const clock = new THREE.Clock();
let   time  = 0;

function animate(){
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  time += dt;

  /* Enhanced fire animation */
  flames.forEach(f => {
    const phase = (time * f.userData.speed + f.userData.offset);
    const cyclePos = phase % 1.0;

    // Y rises then resets
    f.position.y = f.userData.yBase + cyclePos * f.userData.yHeight;

    // Opacity: bright at bottom, fade at top
    const fade = Math.pow(1 - cyclePos, 1.4);
    f.material.opacity = fade * (f.userData.isCore ? 0.95 : 0.72);

    // Lateral sway
    f.position.x = f.userData.xSwing * Math.sin(time * 3.2 + f.userData.offset);

    // Scale flicker
    const flicker = 0.88 + 0.24*Math.sin(time*11.5 + f.userData.offset*2.3);
    f.scale.set(f.userData.sc * flicker, f.userData.sc * 1.5, 1);
  });

  /* Ember particles */
  const pos = embers.geometry.attributes.position;
  for (let i=0;i<EMBER_COUNT;i++){
    const e = emberData[i];
    e.life += dt;
    if (e.life > e.maxLife){
      e.x = (Math.random()-0.5)*0.5;
      e.y = 0.2 + Math.random()*0.3;
      e.z = (Math.random()-0.5)*0.5;
      e.vx = (Math.random()-0.5)*0.007;
      e.vy = 0.01 + Math.random()*0.016;
      e.vz = (Math.random()-0.5)*0.007;
      e.life = 0;
      e.maxLife = 0.6 + Math.random()*1.6;
    }
    e.x += e.vx; e.y += e.vy; e.z += e.vz;
    e.vy -= dt * 0.003; // slight deceleration
    pos.setXYZ(i, e.x, e.y, e.z);
  }
  pos.needsUpdate = true;

  /* Fire lights flicker */
  fireLight.intensity  = 4.8 + Math.sin(time*16)*0.8 + Math.sin(time*7.3)*0.5 + (Math.random()-0.5)*0.35;
  fireFill.intensity   = 1.5 + Math.sin(time*9)*0.4;
  lanternLight.intensity= 0.85 + Math.sin(time*2.8)*0.09;

  /* Glow halo pulse */
  const glowPulse = 0.92 + 0.1*Math.sin(time*5.2);
  glowSpr.scale.set(5.5*glowPulse, 4.5*glowPulse, 1);

  /* Camera orbit */
  if (autoRotate && !isDragging) orbitAngle += dt * 0.044;
  const R = 12;
  camera.position.x = Math.sin(orbitAngle) * R;
  camera.position.z = Math.cos(orbitAngle) * R;
  camera.position.y = 9;
  camera.lookAt(0, 0.6, 0);

  updateLabels();
  renderer.render(scene, camera);
}

boot();
animate();
</script>
